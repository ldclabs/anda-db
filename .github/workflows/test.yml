name: Test
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dfinity/setup-dfx@main
      - name: Run tests
        run: |
          cargo clippy --verbose --all-targets --all-features
          cargo test --verbose --workspace --all-features --exclude anda_cognitive_nexus_py -- --nocapture
  coverage:
    # Coverage is informational (no threshold gate): it surfaces untested
    # branches in core paths; quality is enforced by the test suites themselves.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dfinity/setup-dfx@main
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Collect coverage
        run: |
          cargo llvm-cov --workspace --all-features --exclude anda_cognitive_nexus_py \
            --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
